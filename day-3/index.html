<body>
    <h1>Hey Welcome back in Js Learning, day-3</h1>
    
    
    <form action="#" method="get">
        <label for="pass">Validate Password</label>
        <input type="text" name="pass"  id="pass" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,}">
        <button>Validate</button>
    </form>
    <script src="app.js"></script>
    
</body>
